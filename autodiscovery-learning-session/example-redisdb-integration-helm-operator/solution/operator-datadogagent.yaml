apiVersion: "datadoghq.com/v2alpha1"
kind: "DatadogAgent"
metadata:
  name: "datadog"  
spec:
# include this if you are testing this locally
  global:
    credentials:
      apiKey: "<api key>"
    clusterName: "test-cluster"
    kubelet:
      tlsVerify: false
  # other configurations
  override:
    nodeAgent:
      extraConfd:
        configDataMap:
          redisdb.yaml: |-
            ad_identifiers:
              - redis-secure
            init_config:
            instances:
            - host: "%%host%%"
              port: "%%port_0%%"
              password: my-password
              tags:
              - hello:world
              - foo:bar

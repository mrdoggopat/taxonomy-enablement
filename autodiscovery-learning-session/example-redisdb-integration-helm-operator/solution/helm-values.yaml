datadog:
  # include this if you are testing this locally
  apiKey: "<api key>"
  clusterName: "test-cluster"
  kubelet:
    tlsVerify: false
  # other configurations
  confd:
    redisdb.yaml: |-
      ad_identifiers:
        - redis-secure
      init_config:
      instances:
      - host: "%%host%%"
        port: "%%port_0%%"
        password: my-password
        tags:
        - hello:world
        - foo:bar

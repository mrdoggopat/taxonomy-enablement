apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-test
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        ad.datadoghq.com/my-redis.checks: |
          {
            "redisdb": {
              "init_config": {},
              "instances": [
                {
                  "host": "%%host%%",
                  "port":"%%port%%",
                  "password":"my-password",
                  "tags": [
                    "hello:world",
                    "foo:bar"
                  ]
                }
              ]
            }
          }
    spec:
      containers:
      - name: my-redis
        image: busybox
        imagePullPolicy: Always
        command: [ "/bin/sh", "-c", "--" ]
        args: [ "while true; do sleep 5; 
          echo `date '+%FT%T'` example stdout log; 
          echo `date '+%FT%T'` example stderr log 1>&2;
        done;"
        ]


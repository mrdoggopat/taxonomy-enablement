apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    name: redis
    deploy_label_key: deploy_label_value
spec:
  replicas: 1
  selector:
    matchLabels:
      name: redis
  template:
    metadata:
      labels:
        name: redis
        pod_label_key: pod_label_value
    spec:
      containers:
        - name: redis
          image: redis
          ports:
            - containerPort: 6379
